<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CULT Finance Premium</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0A0705;
  --bg-light: #3D261A;
  --card: #2C1A11;
  --accent: #FFEDAE;
  --text: #FAF7F2;
  --muted: #8E6349;
  --border: #3E291C;
  --red: #ff8e8e;
  --green: #88d498;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

body {
  background: radial-gradient(circle at 50% 35%, var(--bg-light) 0%, var(--bg-dark) 55%);
  background-attachment: fixed;
  background-color: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

.neu-card {
  background: var(--card);
  border-radius: 28px;
  padding: 20px;
  box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -4px -4px 12px rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.03);
  margin-bottom: 15px;
}

.neu-inset {
  background: #150E08;
  border-radius: 16px;
  box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  padding: 12px 15px;
  width: 100%;
  color: white;
  outline: none;
}

.container { padding: 0 20px; }
.top-bar { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { width: 45px; height: 45px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #1A120B !important; font-weight: bold; font-size: 1.2rem; }
.balance-label { color: var(--muted); font-size: 0.85rem; letter-spacing: 1px; }
.balance-amount { font-size: 2.2rem; font-weight: 700; margin-top: 5px; color: var(--text); }

.bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(44, 26, 17, 0.95); backdrop-filter: blur(10px); height: 70px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid var(--border); }
.nav-item { color: var(--muted); font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
.nav-item.active { color: var(--accent); }
.nav-add { background: var(--accent); color: #1A120B !important; width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-top: -35px; }

.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: flex-end; }
.modal-content { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px 40px; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.type-btn { padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--muted); cursor: pointer; text-align: center; font-weight: bold; }
.type-btn.active { border-color: var(--accent); color: #1A120B !important; background: var(--accent); }
.form-label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin: 15px 0 5px 5px; }
.hidden { display: none !important; }

/* Toast */
.toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #1A120B; padding: 12px 25px; border-radius: 20px; font-weight: bold; transition: 0.3s; z-index: 3000; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loginScreen" class="container" style="padding-top: 100px; text-align: center;">
    <div style="font-size: 4rem; margin-bottom: 20px;">💰</div>
    <h1 style="color: var(--accent); margin-bottom: 8px;">CULT Finance</h1>
    <div class="neu-card">
        <input type="text" id="loginUsername" class="neu-inset" placeholder="Username" style="margin-bottom: 15px;">
        <input type="password" id="loginPassword" class="neu-inset" placeholder="Password">
        <div id="loginError" style="color: var(--red); font-size: 0.8rem; margin-top: 10px;"></div>
        <button onclick="doLogin()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 16px; font-weight: bold; margin-top: 20px; color: #1A120B;">Masuk</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="userAvatar">M</div>
            <div>
                <div style="font-size: 0.75rem; color: var(--muted);">Welcome back,</div>
                <div style="font-weight: 600;" id="userLabel">Mey</div>
            </div>
        </div>
        <div class="nav-item" onclick="openSettings()">⚙️</div>
    </div>

    <div id="panel-home" class="panel active container">
        <div class="neu-card" style="text-align: center; padding: 35px 20px;">
            <div class="balance-label">TOTAL BALANCE</div>
            <div class="balance-amount" id="sumBalance">Rp 0</div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <div style="color: var(--green);">▲ <span id="sumIncome">0</span></div>
                <div style="color: var(--red);">▼ <span id="sumExpense">0</span></div>
            </div>
        </div>
        <h3 style="margin: 25px 0 15px; color: var(--accent);">Recent Transactions</h3>
        <div id="historyListHome"></div>
    </div>

    <div id="panel-history" class="panel container">
        <h2 style="margin-bottom: 20px;">History</h2>
        <div id="historyListFull"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPanel('home', this)">🏠</div>
        <div class="nav-add" onclick="openAddModal()">+</div>
        <div class="nav-item" onclick="switchPanel('history', this)">📋</div>
    </div>
</div>

<div id="addModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'addModal')">
    <div class="modal-content">
        <h2 style="color: var(--accent); margin-bottom: 20px;">New Transaction</h2>
        <div class="type-grid">
            <div id="btnExp" class="type-btn active" onclick="setEntryType('expense')">💸 Expense</div>
            <div id="btnInc" class="type-btn" onclick="setEntryType('income')">💵 Income</div>
        </div>
        <label class="form-label">Category</label>
        <select id="selectCatExp" class="neu-inset" onchange="checkIncomeSource(this.value)"></select>
        <div id="customSourceSection" class="hidden" style="margin-top: 15px;">
            <input type="text" id="inputCustomSource" class="neu-inset" placeholder="Misal: Bonus, Dikasih Abah...">
        </div>
        <div id="labelSection">
            <label class="form-label">Label</label>
            <div class="type-grid">
                <div id="btnNeeds" class="type-btn active" onclick="setLabel('needs')">🏡 Needs</div>
                <div id="btnLifestyle" class="type-btn" onclick="setLabel('lifestyle')">✨ Lifestyle</div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label class="form-label">Amount</label><input type="number" id="inputAmount" class="neu-inset"></div>
            <div><label class="form-label">Date</label><input type="date" id="inputDate" class="neu-inset"></div>
        </div>
        <label class="form-label">Description</label>
        <textarea id="inputDesc" class="neu-inset" style="height: 60px; resize: none;"></textarea>
        <button onclick="saveEntry()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:16px; font-weight:bold; margin-top:20px; color:#1A120B;">Confirm</button>
    </div>
</div>

<div id="settingsModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'settingsModal')">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px;">Settings</h2>
        <input type="text" id="settingUser" class="neu-inset" disabled style="opacity: 0.5; margin-bottom: 10px;">
        <div id="pwdSection" class="hidden">
            <input type="password" id="newPwd" class="neu-inset" placeholder="New Password">
            <button onclick="confirmNewPwd()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:12px; margin-top:10px; font-weight:bold;">Update</button>
        </div>
        <button id="pwdTrigger" onclick="showPwdFields()" class="neu-card" style="width:100%; text-align:left; border:none; color:white; cursor:pointer;">🔑 Change Password</button>
        <button onclick="doLogout()" style="width:100%; padding:15px; background:transparent; border:1px solid var(--red); color:var(--red); border-radius:12px; margin-top:10px;">Logout</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS_EXPENSE = [
  { id:'makanan', label:'Makanan & Minuman', icon:'🍱' },
  { id:'restoran', label:'Restoran & Take Out', icon:'🍽️' },
  { id:'kebersihan', label:'Kebersihan & Perawatan', icon:'🧴' },
  { id:'rumah', label:'Kebutuhan Rumah Tangga', icon:'🏠' },
  { id:'transportasi', label:'Transportasi', icon:'🚗' },
  { id:'pakaian', label:'Pakaian & Laundry', icon:'👗' },
  { id:'hiburan', label:'Hiburan', icon:'🎬' },
  { id:'kesehatan', label:'Kesehatan', icon:'💊' },
  { id:'pendidikan', label:'Pendidikan', icon:'📚' },
  { id:'komunikasi', label:'Komunikasi', icon:'📱' },
  { id:'hadiah', label:'Hadiah & Acara Sosial', icon:'🎁' },
  { id:'hutang', label:'Hutang', icon:'📤' },
  { id:'piutang', label:'Piutang', icon:'📥' },
];

const ACCOUNTS_URL = 'https://script.google.com/macros/s/AKfycbyDQ-rPiAJd029gaClhD7v_U3sbg8d89pKXF-wcHsP8rleliLSWeN8Jo7gRLRAXFP3d/exec';
let currentUser = null, SHEET_URL = '', entries = [], currentEntryType = 'expense', selectedINL = 'needs';

async function doLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    if (!user || !pass) { err.textContent = 'Isi dulu bro!'; return; }
    err.textContent = 'Memverifikasi...';
    try {
        const res = await fetch(ACCOUNTS_URL + '?t=' + Date.now());
        const accounts = await res.json();
        const found = accounts.find(a => a.username === user && a.password === pass);
        if (found) {
            currentUser = found; SHEET_URL = found.sheet_url;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userAvatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('userLabel').textContent = user;
            initApp();
        } else { err.textContent = 'Username/Password salah!'; }
    } catch(e) { err.textContent = 'Koneksi bermasalah.'; }
}

function initApp() {
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    setEntryType('expense');
    loadFromSheet();
}

function renderCats() {
    const select = document.getElementById('selectCatExp');
    if (currentEntryType === 'expense') {
        select.innerHTML = CATS_EXPENSE.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
    } else {
        select.innerHTML = '<option value="apih">👨 Dari Apih</option><option value="lain">✏️ Sumber Lain</option>';
    }
}

function setEntryType(type) {
    currentEntryType = type;
    document.getElementById('btnExp').classList.toggle('active', type === 'expense');
    document.getElementById('btnInc').classList.toggle('active', type === 'income');
    document.getElementById('labelSection').style.display = (type === 'expense') ? 'block' : 'none';
    document.getElementById('inputDesc').placeholder = (type === 'expense') ? "dipake buat beli apa duitnya?" : "dapet duit dari mana nih?";
    document.getElementById('customSourceSection').classList.add('hidden');
    renderCats();
}

function checkIncomeSource(val) {
    document.getElementById('customSourceSection').classList.toggle('hidden', !(currentEntryType === 'income' && val === 'lain'));
}

function setLabel(val) {
    selectedINL = val;
    document.getElementById('btnNeeds').classList.toggle('active', val === 'needs');
    document.getElementById('btnLifestyle').classList.toggle('active', val === 'lifestyle');
}

async function loadFromSheet() {
    try {
        const res = await fetch(SHEET_URL + '?t=' + Date.now());
        const data = await res.json();
        entries = data.map(r => ({ id: r.id, date: r.date.split('T')[0], type: r.type, catLabel: r.catLabel, catIcon: r.catIcon, amount: parseFloat(r.amount), desc: r.desc }));
        updateSummary(); renderHistory();
    } catch(e) { console.error(e); }
}

async function saveEntry() {
    const amount = parseInt(document.getElementById('inputAmount').value);
    const date = document.getElementById('inputDate').value;
    const desc = document.getElementById('inputDesc').value.trim();
    const catSelect = document.getElementById('selectCatExp');
    const customSource = document.getElementById('inputCustomSource').value.trim();

    if (!amount || !date) { showToast('⚠️ Isi jumlah & tanggal!', true); return; }
    if (currentEntryType === 'expense' && !desc) { showToast('⚠️ Isi keterangan!', true); return; }

    let catLabel = catSelect.options[catSelect.selectedIndex].text;
    if (currentEntryType === 'income' && catSelect.value === 'lain') {
        if (!customSource) { showToast('⚠️ Sumber lainnya apa?', true); return; }
        catLabel = customSource;
    }

    const entry = {
        id: Date.now(), type: currentEntryType, date: date,
        catLabel: currentEntryType === 'income' ? catLabel : catLabel.split(' ').slice(1).join(' '),
        catIcon: currentEntryType === 'income' ? '💵' : catLabel.split(' ')[0],
        amount: amount, desc: desc || "-",
        inlLabel: currentEntryType === 'expense' ? (selectedINL === 'needs' ? 'Needs' : 'Lifestyle') : 'Income'
    };

    showToast('💾 Menyimpan...');
    entries.unshift(entry); updateSummary(); renderHistory(); closeModal('addModal');

    try {
        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        showToast('✅ Tersimpan!');
    } catch(e) { showToast('❌ Error!', true); }
}

function updateSummary() {
    const inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    document.getElementById('sumBalance').textContent = 'Rp ' + (inc - exp).toLocaleString('id-ID');
    document.getElementById('sumIncome').textContent = inc.toLocaleString('id-ID');
    document.getElementById('sumExpense').textContent = exp.toLocaleString('id-ID');
}

function renderHistory() {
    const grouped = {};
    entries.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
    const sorted = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));
    const html = sorted.map(date => {
        const label = new Date(date).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short'});
        return `<details class="date-group-details" open><summary class="date-group-summary">${label}</summary>${grouped[date].map(e => `
            <div class="neu-card" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div style="font-size:1.2rem;">${e.catIcon}</div>
                    <div><div style="font-size:0.9rem; font-weight:600;">${e.desc}</div><div style="font-size:0.7rem; color:var(--muted);">${e.catLabel}</div></div>
                </div>
                <div style="text-align:right;"><div style="font-weight:bold; color:${e.type==='income'?'var(--green)':'var(--red)'}">${e.type==='income'?'+':'-'}${e.amount.toLocaleString('id-ID')}</div></div>
            </div>`).join('')}</details>`;
    }).join('');
    document.getElementById('historyListFull').innerHTML = html;
    document.getElementById('historyListHome').innerHTML = html;
}

function showToast(msg, isWarn=false) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.style.background = isWarn ? 'var(--red)' : 'var(--accent)';
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('settingUser').value = currentUser.username; }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function closeModalOnOut(e, id) { if(e.target.id === id) closeModal(id); }
function switchPanel(p, el) { document.querySelectorAll('.panel').forEach(x => x.classList.remove('active')); document.getElementById('panel-'+p).classList.add('active'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
function showPwdFields() { document.getElementById('pwdSection').classList.remove('hidden'); document.getElementById('pwdTrigger').classList.add('hidden'); }
function doLogout() { location.reload(); }
</script>
</body>
</html>
