<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasiin Family Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
::-webkit-scrollbar {
  width: 5px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
}  
:root {
  --bg-main: #2D3E40;       /* Background Teal Gelap */
  --card-green: #97B299;    /* Hijau Sage */
  --card-orange: #D9835D;   /* Terracotta */
  --card-peach: #E5B299;    /* Peach */
  --accent-teal: #4FB0AC;   /* Tombol Highlight */
  --text-dark: #2D3E40;     /* Teks Gelap di Kartu */
  --text-light: #FAF7F2;    /* Teks Putih Gading */
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

body {
  background-color: var(--bg-main);
  color: var(--text-light);
  min-height: 100vh;
  padding-bottom: 110px;
}

/* ── CLAYMORPISM CARD ── */
.neu-card {
  background: var(--card-green);
  border-radius: 35px;
  padding: 22px;
  border: none;
  box-shadow: 
    12px 12px 24px rgba(0,0,0,0.2), 
    inset -8px -8px 15px rgba(0,0,0,0.08), 
    inset 8px 8px 15px rgba(255,255,255,0.2);
  color: var(--text-dark);
  margin-bottom: 18px;
  transition: transform 0.2s;
}

.neu-card {
  /* ... kode yang lama ... */
  border-top: 2px solid rgba(255, 255, 255, 0.3); /* Pantulan cahaya atas */
  border-left: 1px solid rgba(255, 255, 255, 0.2);
  transform: translateY(0);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Efek pas kartu ditekan (kerasa kenyal) */
.neu-card:active {
  transform: scale(0.95);
  box-shadow: 
    4px 4px 10px rgba(0,0,0,0.2), 
    inset -5px -5px 10px rgba(0,0,0,0.1);
}

.neu-inset {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  border: 2px solid rgba(255, 255, 255, 0.05);
  padding: 15px;
  width: 100%;
  color: white;
  outline: none;
}

/* ── LAYOUT ── */
.container { padding: 0 20px; }
.top-bar { padding: 40px 20px 25px; display: flex; justify-content: space-between; align-items: center; }
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { width: 48px; height: 48px; background: var(--card-peach); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); font-weight: 800; font-size: 1.2rem; }

.balance-label { color: var(--text-dark); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; opacity: 0.7; }
.balance-amount { font-size: 2.5rem; font-weight: 800; color: var(--text-dark); letter-spacing: -1px; margin-top: 5px; }

/* ── NAVIGATION ── */
.bottom-nav {
  position: fixed; bottom: 25px; left: 20px; right: 20px;
  background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
  height: 75px; border-radius: 30px;
  display: flex; justify-content: space-around; align-items: center;
  border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
}
.bottom-nav {
  /* ... kode yang lama ... */
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 -10px 25px rgba(0,0,0,0.2); /* Shadow ke atas biar nimbul */
}  
.nav-item { color: rgba(255, 255, 255, 0.3); font-size: 1.5rem; cursor: pointer; }
.nav-item.active { color: var(--card-green); }
.nav-add { 
  background: var(--accent-teal) !important; color: white !important; 
  width: 65px; height: 65px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; 
  font-size: 2rem; margin-top: -50px; 
  box-shadow: 0 15px 30px rgba(79, 176, 172, 0.4);
  border: 6px solid var(--bg-main);
}

/* ── PANEL SYSTEM ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.hidden { display: none !important; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: flex-end; }
.modal-content { background: #F2E9E1; width: 100%; border-radius: 40px 40px 0 0; padding: 35px 25px 45px; color: var(--text-dark); }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.type-btn { padding: 15px; border-radius: 20px; border: 2px solid rgba(0,0,0,0.05); background: white; color: var(--text-dark); font-weight: 700; text-align: center; }
.type-btn.active { background: var(--accent-teal) !important; color: white !important; }

.form-label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-dark); opacity: 0.5; text-transform: uppercase; margin: 15px 0 5px 5px; }

.btn-submit { width:100%; padding:18px; background:var(--bg-main); color:white; border:none; border-radius:22px; font-weight:800; margin-top:25px; font-size:1rem; }

.toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--accent-teal); color: white; padding: 12px 25px; border-radius: 20px; font-weight: 700; transition: 0.3s; opacity: 0; z-index: 3000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="loginScreen" class="container" style="padding-top: 100px; text-align: center;">
    <div style="font-size: 4.5rem; margin-bottom: 20px;">🍯</div>
    <h1 style="color: var(--card-peach); font-weight: 800;">Yasiin Family</h1>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 40px;">High Tech, High Love</p>
    <div class="neu-card" style="background: white;">
        <input type="text" id="loginUsername" class="neu-inset" placeholder="Username" style="color: var(--text-dark); background: #f0f0f0; margin-bottom: 15px;">
        <input type="password" id="loginPassword" class="neu-inset" placeholder="Password" style="color: var(--text-dark); background: #f0f0f0;">
        <div id="loginError" style="color: #ff8e8e; font-size: 0.8rem; margin-top: 10px;"></div>
        <button onclick="doLogin()" class="btn-submit" style="background: var(--accent-teal);">Masuk</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="userAvatar">Y</div>
            <div>
                <div style="font-size: 0.75rem;">Family Manager</div>
                <div id="userLabel">User</div>
            </div>
        </div>
        <div class="nav-item" onclick="openSettings()">⚙️</div>
    </div>

    <div id="panel-home" class="panel active container">
        <div class="neu-card" style="background: var(--card-peach); text-align: center; padding: 35px 20px;">
            <div class="balance-label">TOTAL BALANCE</div>
            <div class="balance-amount" id="sumBalance">Rp 0</div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-weight: 700;">
                <div style="color: #2D3E40; opacity: 0.6;">▲ <span id="sumIncome">0</span></div>
                <div style="color: #2D3E40; opacity: 0.6;">▼ <span id="sumExpense">0</span></div>
            </div>
        </div>
        <h3 style="margin: 25px 0 15px; font-weight: 800;">Activity</h3>
        <div id="historyListHome"></div>
    </div>

    <div id="panel-history" class="panel container">
        <h2 style="margin-bottom: 20px;">History</h2>
        <div id="historyListFull"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPanel('home', this)">🏠</div>
        <div class="nav-add" onclick="openAddModal()">+</div>
        <div class="nav-item" onclick="switchPanel('history', this)">📋</div>
    </div>
</div>

<div id="addModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'addModal')">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px; font-weight: 800;">New Record</h2>
        <div class="type-grid">
            <div id="btnExp" class="type-btn active" onclick="setEntryType('expense')">💸 Out</div>
            <div id="btnInc" class="type-btn" onclick="setEntryType('income')">💵 In</div>
        </div>
        <label class="form-label">Category</label>
        <select id="selectCatExp" class="neu-inset" style="background:white; color:var(--text-dark);" onchange="checkIncomeSource(this.value)"></select>
        
        <div id="customSourceSection" class="hidden" style="margin-top: 15px;">
            <label class="form-label">Spesifik Sumber</label>
            <input type="text" id="inputCustomSource" class="neu-inset" style="background:white; color:var(--text-dark);" placeholder="Dikasih siapa?">
        </div>

        <div id="labelSection">
            <label class="form-label">Tag</label>
            <div class="type-grid">
                <div id="btnNeeds" class="type-btn active" onclick="setLabel('needs')">🏡 Needs</div>
                <div id="btnLifestyle" class="type-btn" onclick="setLabel('lifestyle')">✨ Life</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label class="form-label">Amount</label><input type="number" id="inputAmount" class="neu-inset" style="background:white; color:var(--text-dark);"></div>
            <div><label class="form-label">Date</label><input type="date" id="inputDate" class="neu-inset" style="background:white; color:var(--text-dark);"></div>
        </div>

        <label class="form-label">Note</label>
        <textarea id="inputDesc" class="neu-inset" style="height: 70px; resize: none; background:white; color:var(--text-dark);"></textarea>
        
        <button onclick="saveEntry()" class="btn-submit">Confirm Transaction</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null, SHEET_URL = '', entries = [], currentEntryType = 'expense', selectedINL = 'needs';

const CATS_EXPENSE = [
  { id:'makanan', label:'Food', icon:'🍱' },
  { id:'rumah', label:'Home', icon:'🏠' },
  { id:'transportasi', label:'Travel', icon:'🚗' },
  { id:'hiburan', label:'Fun', icon:'🎬' },
  { id:'kesehatan', label:'Health', icon:'💊' },
  { id:'belanja', label:'Shop', icon:'🛒' }
];

const ACCOUNTS_URL = 'https://script.google.com/macros/s/AKfycbyDQ-rPiAJd029gaClhD7v_U3sbg8d89pKXF-wcHsP8rleliLSWeN8Jo7gRLRAXFP3d/exec';

async function doLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    if (!user || !pass) return;
    err.textContent = 'Authenticating...';
    try {
        const res = await fetch(ACCOUNTS_URL + '?t=' + Date.now());
        const accounts = await res.json();
        const found = accounts.find(a => a.username === user && a.password === pass);
        if (found) {
            currentUser = found; SHEET_URL = found.sheet_url;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userAvatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('userLabel').textContent = user;
            initApp();
        } else { err.textContent = 'Invalid Account'; }
    } catch(e) { err.textContent = 'Server Error'; }
}

function initApp() {
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    setEntryType('expense');
    loadFromSheet();
}

function renderCats() {
    const select = document.getElementById('selectCatExp');
    if (currentEntryType === 'expense') {
        select.innerHTML = CATS_EXPENSE.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
    } else {
        select.innerHTML = '<option value="apih">👨 Apih</option><option value="lain">✏️ Others</option>';
    }
}

function setEntryType(type) {
    currentEntryType = type;
    document.getElementById('btnExp').classList.toggle('active', type === 'expense');
    document.getElementById('btnInc').classList.toggle('active', type === 'income');
    document.getElementById('labelSection').style.display = (type === 'expense') ? 'block' : 'none';
    document.getElementById('inputDesc').placeholder = (type === 'expense') ? "Duitnya dipake apa?" : "Dapet duit dari mana?";
    document.getElementById('customSourceSection').classList.add('hidden');
    renderCats();
}

function checkIncomeSource(val) {
    document.getElementById('customSourceSection').classList.toggle('hidden', !(currentEntryType === 'income' && val === 'lain'));
}

function setLabel(val) {
    selectedINL = val;
    document.getElementById('btnNeeds').classList.toggle('active', val === 'needs');
    document.getElementById('btnLifestyle').classList.toggle('active', val === 'lifestyle');
}

async function loadFromSheet() {
    try {
        const res = await fetch(SHEET_URL + '?t=' + Date.now());
        const data = await res.json();
        entries = data.map(r => ({
            id: r.id, 
            date: r.date.split('T')[0], 
            type: r.type, 
            catLabel: r.catLabel, 
            catIcon: r.catIcon || '💰', 
            amount: parseFloat(r.amount), 
            desc: r.desc 
        }));
        updateSummary(); renderHistory();
    } catch(e) { console.error(e); }
}

async function saveEntry() {
    const amount = parseInt(document.getElementById('inputAmount').value);
    const date = document.getElementById('inputDate').value;
    const desc = document.getElementById('inputDesc').value.trim();
    const catSelect = document.getElementById('selectCatExp');
    const customSource = document.getElementById('inputCustomSource').value.trim();

    if (!amount || !date) { showToast('⚠️ Data tidak lengkap'); return; }
    if (currentEntryType === 'expense' && !desc) { showToast('⚠️ Note wajib diisi'); return; }

    let catLabel = catSelect.options[catSelect.selectedIndex].text;
    if (currentEntryType === 'income' && catSelect.value === 'lain') {
        if (!customSource) { showToast('⚠️ Sumber wajib diisi'); return; }
        catLabel = customSource;
    }

    const entry = {
        id: Date.now(), type: currentEntryType, date: date,
        catLabel: currentEntryType === 'income' ? catLabel : catLabel.split(' ').slice(1).join(' '),
        catIcon: currentEntryType === 'income' ? '💵' : catLabel.split(' ')[0],
        amount: amount, desc: desc || "-",
        inlLabel: currentEntryType === 'expense' ? (selectedINL === 'needs' ? 'Needs' : 'Lifestyle') : 'Income'
    };

    showToast('💾 Saving...');
    entries.unshift(entry); updateSummary(); renderHistory(); closeModal('addModal');

    try {
        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        showToast('✅ Success!');
    } catch(e) { showToast('❌ Failed!'); }
}

function updateSummary() {
    const inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    document.getElementById('sumBalance').textContent = 'Rp ' + (inc - exp).toLocaleString('id-ID');
    document.getElementById('sumIncome').textContent = inc.toLocaleString('id-ID');
    document.getElementById('sumExpense').textContent = exp.toLocaleString('id-ID');
}

function renderHistory() {
    const list = document.getElementById('historyListHome');
    const colors = ['#97B299', '#D9835D', '#E5B299', '#B2C4D1'];
    
    list.innerHTML = entries.map((e, i) => `
        <div class="neu-card" style="background: ${colors[i % 4]};">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div style="background:rgba(255,255,255,0.3); width:45px; height:45px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:1.4rem;">${e.catIcon}</div>
                    <div>
                        <div style="font-weight:800; font-size:1rem;">${e.desc}</div>
                        <div style="font-size:0.75rem; font-weight:600; opacity:0.6;">${e.catLabel}</div>
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:800; font-size:1.1rem;">${e.type==='income'?'+':'-'}${e.amount.toLocaleString('id-ID')}</div>
                </div>
            </div>
        </div>
    `).join('') || '<div style="text-align:center; opacity:0.5; padding:20px;">No Data</div>';
    document.getElementById('historyListFull').innerHTML = list.innerHTML;
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function closeModalOnOut(e, id) { if(e.target.id === id) closeModal(id); }
function switchPanel(p, el) { 
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active')); 
    document.getElementById('panel-'+p).classList.add('active'); 
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); 
    el.classList.add('active'); 
}
function animateValue(id, start, end, duration) {
    if (start === end) return;
    const obj = document.getElementById(id);
    const range = end - start;
    let current = start;
    const increment = end > start ? 1 : -1;
    const stepTime = Math.abs(Math.floor(duration / range));
    const timer = setInterval(function() {
        current += (range / 10); // Biar cepet animasinya
        if ((increment === 1 && current >= end) || (increment === -1 && current <= end)) {
            current = end;
            clearInterval(timer);
        }
        obj.textContent = 'Rp ' + Math.floor(current).toLocaleString('id-ID');
    }, 30);
}

// Terus ganti baris updateSummary lu yang bagian sumBalance jadi:
// animateValue('sumBalance', 0, (inc - exp), 500);  
</script>
</body>
</html>
