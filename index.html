<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CULT Finance Premium</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0A0705;    /* Hitam pekat hampir total */
  --bg-light: #3D261A;   /* Coklat tembaga (lebih terang buat kontras) */
  --card: #2C1A11;
  --accent: #FFEDAE;
  --text: #FAF7F2;
  --muted: #8E6349;
  --border: #3E291C;
  --red: #ff8e8e;
  --green: #88d498;
}

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

body {
  /* Gradasi kontras tinggi: Terang di pusat, langsung gelap ke pinggir */
  background: radial-gradient(circle at 50% 35%, var(--bg-light) 0%, var(--bg-dark) 55%);
  background-attachment: fixed;
  background-color: var(--bg-dark); /* Fallback warna gelap */
  
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
  margin: 0;
  font-family: 'DM Sans', sans-serif;
}

  /* ── NEUMORPHISM UTILITY ── */
  .neu-card {
    background: var(--card);
    border-radius: 28px;
    padding: 20px;
    box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -4px -4px 12px rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.03);
    margin-bottom: 15px;
  }

  .neu-inset {
    background: #150E08;
    border-radius: 16px;
    box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    padding: 12px 15px;
    width: 100%;
    color: white;
    outline: none;
  }

  /* ── LAYOUT ── */
  .container { padding: 0 20px; }
  
  .top-bar {
    padding: 30px 20px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .user-info { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 45px; height: 45px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: bold; font-size: 1.2rem; }
  /* Fix warna teks inisial (M) di lingkaran kuning */
.avatar {
    color: #1A120B !important; /* Ganti teks putih jadi hitam pekat */
}

  /* ── SUMARY SALDO ── */
  .balance-label { color: var(--muted); font-size: 0.85rem; letter-spacing: 1px; }
  .balance-amount { font-size: 2.2rem; font-weight: 700; margin-top: 5px; color: var(--text); }

  /* ── NAVIGATION BAWAH (Seperti Gambar) ── */
  .bottom-nav {
    position: fixed;
    bottom: 25px; left: 20px; right: 20px;
    background: rgba(44, 26, 17, 0.95);
    backdrop-filter: blur(10px);
    height: 70px;
    border-radius: 25px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 1000;
    border: 1px solid var(--border);
  }

  .nav-item { color: var(--muted); font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
  .nav-item.active { color: var(--accent); }
  .nav-add { background: var(--accent); color: var(--bg); width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-top: -35px; box-shadow: 0 8px 20px rgba(255, 237, 174, 0.2); }

  /* ── PANEL SYSTEM ── */
  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .hidden { display: none !important; }

  /* ── MODAL SLIDE UP (Untuk Form & Settings) ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 2000;
    display: flex; align-items: flex-end;
  }

  .modal-content {
    background: var(--card);
    width: 100%; border-radius: 30px 30px 0 0;
    padding: 30px 20px 40px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .form-label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; }

  /* Tombol Pilihan Jenis (Expense/Income) */
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .type-btn { padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; text-align: center; font-weight: bold; }
  .type-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-muted); }
  /* Pastikan teks di elemen aksen (kuning) selalu berwarna gelap */
.nav-add, 
.nav-item.active, 
.type-btn.active, 
.btn-submit {
    color: #1A120B !important; /* Warna hitam coklat pekat */
}

/* Jika ada icon di dalamnya, pastikan warnanya ikut gelap */
.nav-add span, .type-btn.active span {
    color: #1A120B !important;
}
</style>
</head>
<body>

<div id="loginScreen" class="container" style="padding-top: 100px; text-align: center;">
    <div style="font-size: 4rem; margin-bottom: 20px;">💰</div>
    <h1 style="color: var(--accent); margin-bottom: 8px;">CULT Finance</h1>
    <p style="color: var(--muted); margin-bottom: 40px;">Premium Money Tracker</p>
    <div class="neu-card">
        <input type="text" id="loginUsername" class="neu-inset" placeholder="Username" style="margin-bottom: 15px;">
        <input type="password" id="loginPassword" class="neu-inset" placeholder="Password">
        <div id="loginError" style="color: var(--red); font-size: 0.8rem; margin-top: 10px; min-height: 20px;"></div>
        <button onclick="doLogin()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 16px; font-weight: bold; margin-top: 20px; cursor: pointer;">Masuk</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="userAvatar">M</div>
            <div>
                <div style="font-size: 0.75rem; color: var(--muted);">Welcome back,</div>
                <div style="font-weight: 600;" id="userLabel">Mathew</div>
            </div>
        </div>
        <div class="nav-item" onclick="openSettings()">⚙️</div>
    </div>

    <div id="panel-home" class="panel active container">
        <div class="neu-card" style="text-align: center; padding: 35px 20px;">
            <div class="balance-label">MY TOTAL BALANCE</div>
            <div class="balance-amount" id="sumBalance">Rp 0</div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <div style="color: var(--green); font-size: 0.9rem;">▲ <span id="sumIncome">Rp 0</span></div>
                <div style="color: var(--red); font-size: 0.9rem;">▼ <span id="sumExpense">Rp 0</span></div>
            </div>
        </div>
        
        <h3 style="margin: 25px 0 15px; font-size: 1.1rem; color: var(--accent);">Recent Transactions</h3>
        <div id="historyListHome">
            </div>
    </div>

    <div id="panel-history" class="panel container">
        <h2 style="margin-bottom: 20px;">Transaction History</h2>
        <div id="historyListFull"></div>
    </div>

    <div id="panel-stats" class="panel container">
        <h2 style="margin-bottom: 20px;">Analytics</h2>
        <div class="neu-card">Fitur statistik segera hadir...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPanel('home', this)">🏠</div>
        <div class="nav-item" onclick="switchPanel('stats', this)">📊</div>
        <div class="nav-add" onclick="openAddModal()">+</div>
        <div class="nav-item" onclick="switchPanel('history', this)">📋</div>
        <div class="nav-item" onclick="openSettings()">👤</div>
    </div>
</div>

<div id="addModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'addModal')">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--accent);">New Transaction</h2>
            <div onclick="closeModal('addModal')" style="cursor:pointer; opacity:0.5;">✕</div>
        </div>

        <div class="type-grid">
            <div id="btnExp" class="type-btn active" onclick="setEntryType('expense')">💸 Expense</div>
            <div id="btnInc" class="type-btn" onclick="setEntryType('income')">💵 Income</div>
        </div>

        <div id="formFields">
            <label class="form-label">Category</label>
            <select id="selectCatExp" class="neu-inset" onchange="checkIncomeSource(this.value)"></select>
          <div id="customSourceSection" class="hidden" style="margin-top: 15px;">
    <label class="form-label">Sumber Pendapatan Spesifik</label>
    <input type="text" id="inputCustomSource" class="neu-inset" placeholder="Misal: bonus kerja, dikasih abah...">
</div>
<div id="labelSection">
    <label class="form-label">Label (Needs / Lifestyle)</label>
    <div class="type-grid" style="margin-bottom: 0;">
        <div id="btnNeeds" class="type-btn" onclick="setLabel('needs')">🏡 Needs</div>
        <div id="btnLifestyle" class="type-btn" onclick="setLabel('lifestyle')">✨ Lifestyle</div>
    </div>
</div>          

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <div>
                    <label class="form-label">Amount (Rp)</label>
                    <input type="number" id="inputAmount" class="neu-inset" placeholder="0">
                </div>
                <div>
                    <label class="form-label">Date</label>
                    <input type="date" id="inputDate" class="neu-inset">
                </div>
            </div>

            <label class="form-label">Description</label>
            <textarea id="inputDesc" class="neu-inset" style="height: 80px; resize: none;"></textarea>
        </div>

        <button onclick="saveEntry()" class="btn-submit" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:16px; font-weight:bold; margin-top:25px; color:var(--bg);">Confirm Transaction</button>
    </div>
</div>

<div id="settingsModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'settingsModal')">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px;">Account Settings</h2>
        
        <label class="form-label">Username</label>
        <input type="text" id="settingUser" class="neu-inset" disabled style="opacity: 0.5;">

        <div id="pwdSection" class="hidden" style="margin-top: 20px;">
            <label class="form-label">New Password</label>
            <input type="password" id="newPwd" class="neu-inset" placeholder="••••••">
            <button onclick="confirmNewPwd()" class="btn-submit" style="width:100%; padding:12px; background:var(--accent); color:var(--bg); border:none; border-radius:12px; margin-top:15px; font-weight:bold;">Update Password</button>
        </div>

        <button id="pwdTrigger" onclick="showPwdFields()" class="neu-card" style="width:100%; text-align:left; border:none; color:var(--text); margin-top:20px; cursor:pointer;">
            🔑 Change Password
        </button>

        <button onclick="doLogout()" class="neu-card" style="width:100%; text-align:center; border:1px solid var(--red); color:var(--red); background:transparent; margin-top:10px; cursor:pointer;">
            🚪 Logout
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG & STATE ──
const CATS_EXPENSE = [
  { id:'makanan', label:'Makanan & Minuman', icon:'🍱' },
  { id:'restoran', label:'Restoran & Take Out', icon:'🍽️' },
  { id:'kebersihan', label:'Kebersihan & Perawatan', icon:'🧴' },
  { id:'rumah', label:'Kebutuhan Rumah Tangga', icon:'🏠' },
  { id:'transportasi', label:'Transportasi', icon:'🚗' },
  { id:'pakaian', label:'Pakaian & Laundry', icon:'👗' },
  { id:'hiburan', label:'Hiburan', icon:'🎬' },
  { id:'kesehatan', label:'Kesehatan', icon:'💊' },
  { id:'pendidikan', label:'Pendidikan', icon:'📚' },
  { id:'komunikasi', label:'Komunikasi', icon:'📱' },
  { id:'hadiah', label:'Hadiah & Acara Sosial', icon:'🎁' },
  { id:'hutang', label:'Hutang', icon:'📤' },
  { id:'piutang', label:'Piutang', icon:'📥' },
];

const ACCOUNTS_URL = 'https://script.google.com/macros/s/AKfycbyDQ-rPiAJd029gaClhD7v_U3sbg8d89pKXF-wcHsP8rleliLSWeN8Jo7gRLRAXFP3d/exec';
const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

let currentUser = null;
let SHEET_URL = '';
let currentEntryType = 'expense';
let entries = [];
let selectedINL = 'needs'; // Default awal  
let viewMonth = new Date().getMonth();
let viewYear = new Date().getFullYear();

// ── LOGIN ──
async function doLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    if (!user || !pass) { err.textContent = 'Isi dulu bro!'; return; }

    err.textContent = 'Memverifikasi...';
    try {
        const res = await fetch(ACCOUNTS_URL + '?t=' + Date.now());
        const accounts = await res.json();
        const found = accounts.find(a => a.username === user && a.password === pass);
        
        if (found) {
            currentUser = found;
            SHEET_URL = found.sheet_url;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userAvatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('userLabel').textContent = user;
            initApp();
        } else { err.textContent = 'Username/Password salah!'; }
    } catch(e) { err.textContent = 'Koneksi bermasalah.'; }
}

// ── INIT ──
function initApp() {
    const now = new Date();
    document.getElementById('inputDate').value = now.toISOString().split('T')[0];
    document.getElementById('inputDesc').placeholder = "dipake buat beli apa duitnya?";
    renderCats();
    loadFromSheet();
}

function renderCats() {
    const select = document.getElementById('selectCatExp');
    if (currentEntryType === 'expense') {
        select.innerHTML = CATS_EXPENSE.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
    } else {
        select.innerHTML = '<option value="apih">👨 Dari Apih</option><option value="lain">✏️ Sumber Lain</option>';
    }
}

function setEntryType(type) {
    currentEntryType = type;
    document.getElementById('btnExp').classList.toggle('active', type === 'expense');
    document.getElementById('btnInc').classList.toggle('active', type === 'income');
    renderCats();
}

// ── DATA HANDLING ──
async function loadFromSheet() {
    try {
        const res = await fetch(SHEET_URL + '?t=' + Date.now());
        const data = await res.json();
        entries = data.map(r => ({
            id: r.id,
            date: formatDateFromSheet(r.date),
            type: r.type,
            catLabel: r.catLabel || '',
            catIcon: r.catIcon || (r.type === 'income' ? '💵' : '💸'),
            amount: parseFloat(r.amount) || 0,
            desc: r.desc || ''
        }));
        updateSummary();
        renderHistory();
    } catch(e) { showToast('⚠️ Gagal muat data', true); }
}

async function saveEntry() {
    const amount = parseInt(document.getElementById('inputAmount').value);
    const date = document.getElementById('inputDate').value;
    const desc = document.getElementById('inputDesc').value.trim();
    const catSelect = document.getElementById('selectCatExp');
    const customSource = document.getElementById('inputCustomSource').value.trim();
    
    // 1. Validasi Dasar
    if (!amount || !date) { showToast('⚠️ Jumlah & Tanggal wajib diisi!', true); return; }

    // 2. Validasi Khusus Pengeluaran (Deskripsi Wajib)
    if (currentEntryType === 'expense' && !desc) {
        showToast('⚠️ Kasih keterangan duitnya buat apa!', true);
        return;
    }

    // 3. Validasi Khusus Pemasukan (Sumber Lain Wajib Diisi)
    let finalCatLabel = catSelect.options[catSelect.selectedIndex].text;
    if (currentEntryType === 'income' && catSelect.value === 'lain') {
        if (!customSource) {
            showToast('⚠️ Sumber lainnya dapet dari mana?', true);
            return;
        }
        finalCatLabel = customSource; // Ganti label 'Sumber Lain' jadi inputan user
    }

    const entry = {
        id: Date.now(),
        type: currentEntryType,
        date: date,
        catLabel: currentEntryType === 'income' ? finalCatLabel : finalCatLabel.split(' ').slice(1).join(' '),
        catIcon: currentEntryType === 'income' ? '💵' : finalCatLabel.split(' ')[0],
        amount: amount,
        desc: desc || "-", // Kalau kosong kasih strip (khusus income)
        inlLabel: currentEntryType === 'expense' ? (selectedINL === 'needs' ? 'Needs' : 'Lifestyle') : 'Income'
    };

    // ... sisa kode simpan ke sheet (fetch) tetep sama ...
    // Jangan lupa reset input customSource setelah simpan
    document.getElementById('inputCustomSource').value = '';
}

    showToast('💾 Menyimpan...');
    entries.unshift(entry);
    updateSummary();
    renderHistory();
    closeModal('addModal');

    try {
        await fetch(SHEET_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry)
        });
        showToast('✅ Tersimpan!');
    } catch(e) { showToast('❌ Gagal ke Sheet', true); }
}

function updateSummary() {
    const income = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const expense = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const balance = income - expense;

    document.getElementById('sumBalance').textContent = formatRp(balance);
    document.getElementById('sumIncome').textContent = formatRp(income);
    document.getElementById('sumExpense').textContent = formatRp(expense);
}

function renderHistory() {
    const listHome = document.getElementById('historyListHome');
    const listFull = document.getElementById('historyListFull');
    
    // Grouping per tanggal untuk Full History
    const grouped = {};
    entries.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = [];
        grouped[e.date].push(e);
    });

    const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));

    const html = sortedDates.map(date => {
        const d = new Date(date + 'T00:00:00');
        const label = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short'});
        return `
            <details class="date-group-details" open>
                <summary class="date-group-summary"><span>${label}</span></summary>
                ${grouped[date].map(e => `
                    <div class="neu-card" style="padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <div style="font-size: 1.2rem;">${e.catIcon}</div>
                            <div>
                                <div style="font-size: 0.9rem; font-weight: 600;">${e.desc}</div>
                                <div style="font-size: 0.7rem; color: var(--muted);">${e.catLabel}</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: bold; color: ${e.type==='income'?'var(--green)':'var(--red)'}">
                                ${e.type==='income'?'+':'-'}${formatRp(e.amount)}
                            </div>
                            <div onclick="deleteEntry(${e.id})" style="font-size: 0.6rem; color: var(--muted); cursor: pointer;">Hapus</div>
                        </div>
                    </div>
                `).join('')}
            </details>
        `;
    }).join('');

    listFull.innerHTML = html || '<div style="text-align:center; color:var(--muted);">Kosong nih...</div>';
    listHome.innerHTML = html; // Untuk sementara home sama dengan full
}

// ── UTILS ──
function formatRp(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function formatDateFromSheet(val) {
    let d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return d.toISOString().split('T')[0];
}
function showToast(msg, isWarn=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isWarn ? 'var(--red)' : 'var(--accent)';
    t.style.color = isWarn ? 'white' : 'var(--bg)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Modal Helpers
function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
function openSettings() { 
    document.getElementById('settingsModal').classList.remove('hidden');
    document.getElementById('settingUser').value = currentUser.username;
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function switchPanel(panelId, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + panelId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}
function doLogout() { location.reload(); }
// ── FUNGSI TAMBAHAN (FIX ERROR CONSOLE) ──

// Fungsi nutup modal kalau klik area luar (background hitam)
function closeModalOnOut(e, id) {
    if (e.target.id === id) closeModal(id);
}

// Fungsi memunculkan kolom input password baru
function showPwdFields() {
    document.getElementById('pwdSection').classList.remove('hidden');
    document.getElementById('pwdTrigger').classList.add('hidden');
}

// Fungsi menyembunyikan kembali kolom password (tombol Batal)
function hidePwdForm() {
    document.getElementById('pwdSection').classList.add('hidden');
    document.getElementById('pwdTrigger').classList.remove('hidden');
    document.getElementById('newPwd').value = '';
}

// Fungsi umum nutup modal berdasarkan ID
function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
}

// Fungsi konfirmasi ubah password (dipanggil di tombol Update Password)
async function confirmNewPwd() {
    const newPass = document.getElementById('newPwd').value.trim();
    if (!newPass || newPass.length < 4) {
        showToast('⚠️ Password minimal 4 karakter', true);
        return;
    }
    
    showToast('💾 Menghubungkan...');
    try {
        await fetch(ACCOUNTS_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser.username, new_password: newPass })
        });
        showToast('✅ Password Berhasil Diubah!');
        hidePwdForm();
        closeModal('settingsModal');
    } catch(e) {
        showToast('❌ Gagal mengubah password', true);
    }
}
