<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasiin Family Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #2D3E40;       /* Background Utama Gelap */
  --card-sage: #97B299;     /* Hijau Sage */
  --card-terra: #D9835D;    /* Terracotta */
  --card-sand: #E5B299;     /* Sand / Peach */
  --accent-teal: #4FB0AC;   /* Teal Cerah */
  --text-dark: #2D3E40;     /* Teks Gelap di kartu */
  --text-white: #FAF7F2;    /* Teks Putih Gading */
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'DM Sans', sans-serif; }

body {
  background-color: var(--bg-deep);
  color: var(--text-white);
  min-height: 100vh;
  padding-bottom: 110px;
  overflow-x: hidden;
  position: relative;
}

/* DEKORASI BACKGROUND (Shape Organik ala Referensi) */
body::before {
  content: "";
  position: fixed;
  top: -100px; right: -80px;
  width: 300px; height: 300px;
  background: var(--card-terra);
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  z-index: -1;
}

/* CLAY CARD STYLE (Flat tapi Soft) */
.clay-card {
  background: var(--card-sage);
  border-radius: 40px; /* Sangat bulat sesuai referensi */
  padding: 25px;
  border: none;
  box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
  color: var(--text-dark);
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

/* Variasi Warna Kartu */
.bg-sage { background-color: var(--card-sage); }
.bg-terra { background-color: var(--card-terra); }
.bg-sand { background-color: var(--card-sand); }

/* KHUSUS SECTION ACTIVITY (Background berbeda) */
.activity-section {
  background: rgba(255, 255, 255, 0.05);
  margin: 0 -20px;
  padding: 30px 20px;
  border-radius: 50px 50px 0 0;
  min-height: 400px;
}

.section-title {
  font-size: 1.4rem;
  font-weight: 800;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* NAVIGATION GAYA BARU (Flat Floating) */
.bottom-nav {
  position: fixed; bottom: 30px; left: 20px; right: 20px;
  background: #FAF7F2;
  height: 80px; border-radius: 40px;
  display: flex; justify-content: space-around; align-items: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  z-index: 1000;
}

.nav-item { color: #A0A0A0; font-size: 1.6rem; cursor: pointer; }
.nav-item.active { color: var(--accent-teal); }

.nav-add { 
  background: var(--accent-teal); color: white !important; 
  width: 70px; height: 70px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; 
  font-size: 2.2rem; margin-top: -50px; 
  box-shadow: 0 10px 25px rgba(79, 176, 172, 0.5);
  border: 8px solid var(--bg-deep);
}

/* MODAL & INPUT (Clean & Flat) */
.modal-content { 
  background: #FAF7F2; width: 100%; border-radius: 50px 50px 0 0; 
  padding: 40px 25px; color: var(--text-dark); 
}

.clay-input {
  background: #E8E8E8;
  border: none; border-radius: 20px;
  padding: 18px; width: 100%;
  font-size: 1rem; color: var(--text-dark);
  margin-top: 10px;
}

.type-btn { 
  padding: 16px; border-radius: 25px; background: #E8E8E8; 
  font-weight: 800; border: none; transition: 0.3s;
}
.type-btn.active { background: var(--accent-teal); color: white; }

.toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: var(--accent-teal); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 700; z-index: 3000; opacity: 0; transition: 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="loginScreen" class="container" style="padding-top: 100px; text-align: center;">
    <div style="font-size: 4.5rem; margin-bottom: 20px;">🍯</div>
    <h1 style="color: var(--card-peach); font-weight: 800;">Yasiin Family</h1>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 40px;">High Tech, High Love</p>
    <div class="neu-card" style="background: white;">
        <input type="text" id="loginUsername" class="neu-inset" placeholder="Username" style="color: var(--text-dark); background: #f0f0f0; margin-bottom: 15px;">
        <input type="password" id="loginPassword" class="neu-inset" placeholder="Password" style="color: var(--text-dark); background: #f0f0f0;">
        <div id="loginError" style="color: #ff8e8e; font-size: 0.8rem; margin-top: 10px;"></div>
        <button onclick="doLogin()" class="btn-submit" style="background: var(--accent-teal);">Masuk</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-bar container" style="padding-top: 50px;">
        <div class="user-info">
            <div class="avatar" id="userAvatar">Y</div>
            <div>
                <div style="font-size: 0.8rem; opacity: 0.6;">Good Morning,</div>
                <div id="userLabel" style="font-size: 1.4rem; font-weight: 800;">Yasiin</div>
            </div>
        </div>
        <div class="nav-item" onclick="openSettings()">⚙️</div>
    </div>

    <div id="panel-home" class="panel active container">
        <div class="clay-card bg-sand" style="text-align: center; padding: 40px 20px; margin-top: 20px;">
            <div style="font-size: 0.8rem; font-weight: 700; opacity: 0.7;">MY TOTAL BALANCE</div>
            <div id="sumBalance" style="font-size: 2.8rem; font-weight: 900; letter-spacing: -2px;">Rp 0</div>
            <div style="display: flex; justify-content: center; gap: 30px; margin-top: 25px; font-weight: 800;">
                <div style="color: #2D3E40;">↑ <span id="sumIncome">0</span></div>
                <div style="color: #2D3E40;">↓ <span id="sumExpense">0</span></div>
            </div>
        </div>

        <div class="activity-section">
            <h3 class="section-title">Today's Activity <span style="font-size: 0.7rem; background: var(--accent-teal); color: white; padding: 4px 12px; border-radius: 20px;">Hari ini</span></h3>
            <div id="historyListHome"></div>
        </div>
    </div>

    <div id="panel-history" class="panel container">
        <h2 style="margin: 30px 0 20px; font-weight: 800; font-size: 2rem;">Full History</h2>
        <div id="historyListFull"></div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPanel('home', this)">🏠</div>
        <div class="nav-add" onclick="openAddModal()">+</div>
        <div class="nav-item" onclick="switchPanel('history', this)">📋</div>
    </div>
</div>

<div id="addModal" class="modal-overlay hidden" onclick="closeModalOnOut(event, 'addModal')">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px; font-weight: 800;">New Record</h2>
        <div class="type-grid">
            <div id="btnExp" class="type-btn active" onclick="setEntryType('expense')">💸 Out</div>
            <div id="btnInc" class="type-btn" onclick="setEntryType('income')">💵 In</div>
        </div>
        <label class="form-label">Category</label>
        <select id="selectCatExp" class="neu-inset" style="background:white; color:var(--text-dark);" onchange="checkIncomeSource(this.value)"></select>
        
        <div id="customSourceSection" class="hidden" style="margin-top: 15px;">
            <label class="form-label">Spesifik Sumber</label>
            <input type="text" id="inputCustomSource" class="neu-inset" style="background:white; color:var(--text-dark);" placeholder="Dikasih siapa?">
        </div>

        <div id="labelSection">
            <label class="form-label">Tag</label>
            <div class="type-grid">
                <div id="btnNeeds" class="type-btn active" onclick="setLabel('needs')">🏡 Needs</div>
                <div id="btnLifestyle" class="type-btn" onclick="setLabel('lifestyle')">✨ Life</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label class="form-label">Amount</label><input type="number" id="inputAmount" class="neu-inset" style="background:white; color:var(--text-dark);"></div>
            <div><label class="form-label">Date</label><input type="date" id="inputDate" class="neu-inset" style="background:white; color:var(--text-dark);"></div>
        </div>

        <label class="form-label">Note</label>
        <textarea id="inputDesc" class="neu-inset" style="height: 70px; resize: none; background:white; color:var(--text-dark);"></textarea>
        
        <button onclick="saveEntry()" class="btn-submit">Confirm Transaction</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- STATE & CONFIG ---
let currentUser = null, SHEET_URL = '', entries = [], currentEntryType = 'expense', selectedINL = 'needs';

// KATEGORI LENGKAP & BILINGUAL
const CATS_EXPENSE = [
  { id:'makanan', label:'Food & Drink (Makan)', icon:'🍱' },
  { id:'restoran', label:'Dining Out (Jajan)', icon:'🍽️' },
  { id:'kebersihan', label:'Hygiene (Kebersihan)', icon:'🧴' },
  { id:'rumah', label:'Household (Rumah)', icon:'🏠' },
  { id:'transportasi', label:'Travel (Transport)', icon:'🚗' },
  { id:'pakaian', label:'Apparel (Baju)', icon:'👗' },
  { id:'hiburan', label:'Entertainment (Hiburan)', icon:'🎬' },
  { id:'kesehatan', label:'Medical (Kesehatan)', icon:'💊' },
  { id:'pendidikan', label:'Study (Pendidikan)', icon:'📚' },
  { id:'komunikasi', label:'Internet (Kuota/Pulsa)', icon:'📱' },
  { id:'hadiah', label:'Gift (Kado/Sosial)', icon:'🎁' }
];

const ACCOUNTS_URL = 'https://script.google.com/macros/s/AKfycbyDQ-rPiAJd029gaClhD7v_U3sbg8d89pKXF-wcHsP8rleliLSWeN8Jo7gRLRAXFP3d/exec';

// --- CORE FUNCTIONS ---
async function doLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    if (!user || !pass) return;
    err.textContent = 'Authenticating...';
    try {
        const res = await fetch(ACCOUNTS_URL + '?t=' + Date.now());
        const accounts = await res.json();
        const found = accounts.find(a => a.username === user && a.password === pass);
        if (found) {
            currentUser = found; SHEET_URL = found.sheet_url;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userAvatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('userLabel').textContent = user;
            initApp();
        } else { err.textContent = 'Invalid Account'; }
    } catch(e) { err.textContent = 'Server Error'; }
}

function initApp() {
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    setEntryType('expense');
    loadFromSheet();
}

async function loadFromSheet() {
    try {
        const res = await fetch(SHEET_URL + '?t=' + Date.now());
        const data = await res.json();
        entries = data.map(r => ({
            id: r.id, 
            date: r.date.split('T')[0], 
            type: r.type, 
            catLabel: r.catLabel, 
            catIcon: r.catIcon || '💰', 
            amount: parseFloat(r.amount), 
            desc: r.desc 
        }));
        updateSummary(); 
        renderHistory();
    } catch(e) { console.error(e); }
}

// --- UI RENDERING (PIXIE STYLE) ---
function renderHistory() {
    const listHome = document.getElementById('historyListHome');
    const listFull = document.getElementById('historyListFull');
    const today = new Date().toISOString().split('T')[0];

    // Filter Khusus Hari Ini untuk Home
    const todayEntries = entries.filter(e => e.date === today);

    // Grouping Data per Tanggal untuk Tab History
    const grouped = {};
    entries.forEach(e => { 
        if (!grouped[e.date]) grouped[e.date] = []; 
        grouped[e.date].push(e); 
    });
    const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));

    const colors = ['#97B299', '#D9835D', '#E5B299', '#B2C4D1'];

    // RENDER HOME (Today's Activity)
    listHome.innerHTML = todayEntries.map((e, i) => `
        <div class="clay-card" style="background: ${colors[i % 4]};">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div style="background:rgba(255,255,255,0.3); width:50px; height:50px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">${e.catIcon}</div>
                    <div>
                        <div style="font-weight:800; font-size:1.1rem; color:#2D3E40;">${e.desc}</div>
                        <div style="font-size:0.8rem; font-weight:600; opacity:0.6; color:#2D3E40;">${e.catLabel}</div>
                    </div>
                </div>
                <div style="font-weight:900; font-size:1.2rem; color:#2D3E40;">${e.type==='income'?'+':'-'}${e.amount.toLocaleString('id-ID')}</div>
            </div>
        </div>
    `).join('') || '<div style="text-align:center; opacity:0.5; padding:40px;">No transactions today (Belum ada jajan hari ini).</div>';

    // RENDER HISTORY TAB (Collapse Style)
    listFull.innerHTML = sortedDates.map(date => {
        const isToday = date === today;
        const dateObj = new Date(date);
        const dateLabel = dateObj.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
        
        return `
            <details style="margin-bottom:15px;" ${isToday ? 'open' : ''}>
                <summary style="font-weight:800; color:#E5B299; cursor:pointer; padding:10px 0; font-size:1rem; list-style:none;">
                    📅 ${isToday ? 'Today (Hari Ini)' : dateLabel} <span style="float:right; opacity:0.5;">▼</span>
                </summary>
                ${grouped[date].map((e, i) => `
                    <div class="clay-card" style="background: ${colors[i % 4]}; margin-top:10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px; align-items:center;">
                                <div style="font-size:1.5rem;">${e.catIcon}</div>
                                <div>
                                    <div style="font-weight:800; color:#2D3E40;">${e.desc}</div>
                                    <div style="font-size:0.75rem; font-weight:600; opacity:0.6; color:#2D3E40;">${e.catLabel}</div>
                                </div>
                            </div>
                            <div style="font-weight:900; color:#2D3E40;">${e.type==='income'?'+':'-'}${e.amount.toLocaleString('id-ID')}</div>
                        </div>
                    </div>
                `).join('')}
            </details>
        `;
    }).join('');
}

// --- FORM HANDLING ---
function setEntryType(type) {
    currentEntryType = type;
    document.getElementById('btnExp').classList.toggle('active', type === 'expense');
    document.getElementById('btnInc').classList.toggle('active', type === 'income');
    document.getElementById('labelSection').style.display = (type === 'expense') ? 'block' : 'none';
    document.getElementById('inputDesc').placeholder = (type === 'expense') ? "Duitnya dipake apa? (Ex: Beli cilok)" : "Dapet duit dari mana? (Ex: Gaji)";
    document.getElementById('customSourceSection').classList.add('hidden');
    renderCats();
}

function renderCats() {
    const select = document.getElementById('selectCatExp');
    if (currentEntryType === 'expense') {
        select.innerHTML = CATS_EXPENSE.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
    } else {
        select.innerHTML = '<option value="apih">👨 From Apih (Apih)</option><option value="lain">✏️ Others (Lainnya)</option>';
    }
}

async function saveEntry() {
    const amount = parseInt(document.getElementById('inputAmount').value);
    const date = document.getElementById('inputDate').value;
    const desc = document.getElementById('inputDesc').value.trim();
    const catSelect = document.getElementById('selectCatExp');
    const customSource = document.getElementById('inputCustomSource').value.trim();

    if (!amount || !date) { showToast('⚠️ Data tidak lengkap!'); return; }
    if (currentEntryType === 'expense' && !desc) { showToast('⚠️ Note/Keterangan wajib diisi!'); return; }

    let catLabel = catSelect.options[catSelect.selectedIndex].text;
    if (currentEntryType === 'income' && catSelect.value === 'lain') {
        if (!customSource) { showToast('⚠️ Sumber wajib diisi!'); return; }
        catLabel = customSource;
    }

    const entry = {
        id: Date.now(), type: currentEntryType, date: date,
        catLabel: currentEntryType === 'income' ? catLabel : catLabel.split(' ').slice(0, -1).join(' '),
        catIcon: currentEntryType === 'income' ? (catSelect.value === 'apih' ? '👨' : '💵') : catLabel.split(' ')[0],
        amount: amount, desc: desc || "-",
        inlLabel: currentEntryType === 'expense' ? (selectedINL === 'needs' ? 'Needs' : 'Lifestyle') : 'Income'
    };

    showToast('💾 Saving (Menyimpan)...');
    entries.unshift(entry); 
    updateSummary(); 
    renderHistory(); 
    closeModal('addModal');

    try {
        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        showToast('✅ Success (Berhasil)!');
    } catch(e) { showToast('❌ Failed (Gagal)!'); }
}

// --- UTILS ---
function updateSummary() {
    const inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    
    // Animasi angka saldo
    const oldBalance = parseInt(document.getElementById('sumBalance').textContent.replace(/\D/g,'')) || 0;
    animateValue('sumBalance', oldBalance, (inc - exp), 500);
    
    document.getElementById('sumIncome').textContent = inc.toLocaleString('id-ID');
    document.getElementById('sumExpense').textContent = exp.toLocaleString('id-ID');
}

function animateValue(id, start, end, duration) {
    const obj = document.getElementById(id);
    const range = end - start;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        const current = Math.floor(progress * range + start);
        obj.textContent = 'Rp ' + current.toLocaleString('id-ID');
        if (progress < 1) window.requestAnimationFrame(step);
    }
    window.requestAnimationFrame(step);
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

// Fungsi Modal & Nav tetep sama
function checkIncomeSource(v) { document.getElementById('customSourceSection').classList.toggle('hidden', !(currentEntryType==='income' && v==='lain')); }
function setLabel(v) { selectedINL=v; document.getElementById('btnNeeds').classList.toggle('active', v==='needs'); document.getElementById('btnLifestyle').classList.toggle('active', v==='lifestyle'); }
function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function closeModalOnOut(e, id) { if(e.target.id === id) closeModal(id); }
function switchPanel(p, el) { 
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active')); 
    document.getElementById('panel-'+p).classList.add('active'); 
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); 
    el.classList.add('active'); 
}
</script>
</body>
</html>
